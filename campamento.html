<!DOCTYPE html>

<html lang="es">
<head>
	<meta charset="UTF-8">
	<title>Lista de Campamento</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
	body { font-family: 'Poppins', sans-serif; }

	.tachado {
		text-decoration: line-through;
		opacity: 0.6;
	}

	.btn-delete {
		width: 22px;
		height: 22px;
		font-size: 12px;
		border-radius: 50%;
		margin-left: 10px;
		display: flex;
		align-items: center;
		justify-content: center;
	}

	.titulo-grupo {
		text-transform: uppercase;
		font-weight: 600;
		cursor: grab;
	}

	.lugar-titulo {
		font-size: 2rem;
		text-align: center;
		font-weight: 600;
		border: none;
		background: transparent;
		color: #0d6efd;
		resize: none;
		overflow: hidden;
	}

	.fecha-texto {
		text-align: center;
		color: gray;
		margin-bottom: 10px;
	}
</style>

</head>

<body class="bg-light">

<div class="container my-4">

<h1 class="text-center">🏕️ Lista de Campamento</h1>

<textarea id="lugar" class="lugar-titulo w-100" rows="1" placeholder="Lugar"></textarea>

<div id="textoFecha" class="fecha-texto"></div>

<div class="row mb-3">
	<div class="col-6">
		<input type="date" id="fechaInicio" class="form-control">
	</div>
	<div class="col-6">
		<input type="date" id="fechaFin" class="form-control">
	</div>
</div>

<div id="listas"></div>

<div class="mt-3">
	<input type="text" id="nuevoTitulo" class="form-control mb-2" placeholder="Agregar subtítulo">
	<button class="btn btn-primary w-100" onclick="agregarSubtitulo()">Agregar</button>
</div>

<div class="mt-2">
	<button class="btn btn-outline-secondary w-100" onclick="resetearLista()">🔄 Restablecer lista</button>
</div>


</div>

<!-- SORTABLE -->

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<script>

// ---------- LISTA INICIAL ----------
const listaInicial = [
	{
		titulo: "BOLSA DE HIGIENE",
		items: [
			{ texto: "Cepillo de dientes", checked: false },
			{ texto: "Dentífrico", checked: false },
			{ texto: "Toalla de manos", checked: false },
			{ texto: "Cepillo/peine", checked: false },
			{ texto: "Jabón", checked: false },
			{ texto: "Alcohol de manos", checked: false },
			{ texto: "Desodorante", checked: false },
			{ texto: "Pañuelitos", checked: false }
		]
	},
	{
		titulo: "BOLSA DE RANCHO",
		items: [
			{ texto: "Vaso", checked: false },
			{ texto: "Plato", checked: false },
			{ texto: "Cubiertos", checked: false },
			{ texto: "Repasador", checked: false }
		]
	},
	{
		titulo: "MUDAS DE ROPA",
		items: []
	},
	{
		titulo: "ABRIGO",
		items: [
			{ texto: "Campera de abrigo", checked: false },
			{ texto: "Poncho", checked: false }
		]
	},
	{
		titulo: "OTRO",
		items: []
	}
];

// ---------- CARGA ----------
let listas;

try {
	listas = JSON.parse(localStorage.getItem("listas")) || listaInicial;
} catch {
	listas = listaInicial;
}

// ---------- GUARDAR ----------
function guardar() {
	localStorage.setItem("listas", JSON.stringify(listas));
}

// ---------- FECHA ----------
function actualizarTextoFecha() {
	if (!fInicio.value || !fFin.value) {
		document.getElementById("textoFecha").innerText = "";
		return;
	}

	const [y1,m1,d1] = fInicio.value.split("-").map(Number);
	const [y2,m2,d2] = fFin.value.split("-").map(Number);

	const inicio = new Date(y1, m1-1, d1);
	const fin = new Date(y2, m2-1, d2);

	const diff = Math.round((fin - inicio) / (1000*60*60*24));

	const meses = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];

	let texto = "";

	if (diff === 0) texto = `${d1} de ${meses[m1-1]}`;
	else if (diff === 1 && m1 === m2) texto = `${d1} y ${d2} de ${meses[m1-1]}`;
	else texto = `Del ${d1} de ${meses[m1-1]} al ${d2} de ${meses[m2-1]}`;

	document.getElementById("textoFecha").innerText = texto;
}

// ---------- RENDER ----------
function render() {
	const cont = document.getElementById("listas");
	cont.innerHTML = "";

	listas.forEach((g,i)=>{

		let html = `
		<div class="card mb-2 grupo" data-index="${i}">
		<div class="card-body">

		<div class="d-flex justify-content-between">
			<b class="titulo-grupo">${g.titulo}</b>
			<button class="btn btn-outline-danger btn-sm" onclick="borrarGrupo(${i})">✕</button>
		</div>
		`;

		g.items.forEach((it,j)=>{

			html+=`
			<div class="d-flex align-items-center">
				<input type="checkbox" ${it.checked?"checked":""}
					onchange="toggle(${i},${j},this.checked)">
				<span class="${it.checked?"tachado":""} ms-2">${it.texto}</span>

				<button class="btn btn-outline-danger btn-delete"
					onclick="borrarItem(${i},${j})">✕</button>
			</div>
			`;
		});

		html+=`
		<div class="d-flex mt-2">
			<input id="i_${i}" class="form-control me-2"
				onkeypress="if(event.key==='Enter') addItem(${i})">
			<button class="btn btn-success btn-sm" onclick="addItem(${i})">+</button>
		</div>

		</div></div>
		`;

		cont.innerHTML+=html;
	});

	activarDrag();
}

// ---------- DRAG ----------
function activarDrag() {
	const cont = document.getElementById("listas");

	new Sortable(cont, {
		animation: 150,
		handle: ".titulo-grupo",
		onEnd: function () {

			const nuevoOrden = [];

			document.querySelectorAll(".grupo").forEach(el => {
				const index = parseInt(el.dataset.index);
				nuevoOrden.push(listas[index]);
			});

			listas = nuevoOrden;
			guardar();
			render();
		}
	});
}

// ---------- ACCIONES ----------
function toggle(i,j,val){
	listas[i].items[j].checked = val;
	guardar();
	render();
}

function borrarItem(i,j){
	if(!confirm("¿Borrar item?")) return;
	listas[i].items.splice(j,1);
	guardar();
	render();
}

function borrarGrupo(i){
	if(!confirm("¿Borrar subtítulo?")) return;
	listas.splice(i,1);
	guardar();
	render();
}

function addItem(i){
	const input = document.getElementById("i_"+i);
	if(!input.value.trim()) return;

	listas[i].items.push({texto:input.value, checked:false});
	input.value="";
	guardar();
	render();
}

function agregarSubtitulo(){
	const t = document.getElementById("nuevoTitulo");
	if(!t.value.trim()) return;

	listas.push({titulo:t.value.toUpperCase(), items:[]});
	t.value="";
	guardar();
	render();
}

// ---------- LUGAR ----------
const lugar = document.getElementById("lugar");

lugar.value = localStorage.getItem("lugar") || "";

lugar.addEventListener("input", e => {
	localStorage.setItem("lugar", e.target.value);
	autoResize(e.target);
});

function autoResize(el){
	el.style.height="auto";
	el.style.height=el.scrollHeight+"px";
}

// ---------- FECHAS ----------
const fInicio = document.getElementById("fechaInicio");
const fFin = document.getElementById("fechaFin");

fInicio.value = localStorage.getItem("inicio") || "";
fFin.value = localStorage.getItem("fin") || "";

[fInicio,fFin].forEach(el=>{
	el.addEventListener("input", ()=>{
		localStorage.setItem("inicio", fInicio.value);
		localStorage.setItem("fin", fFin.value);
		actualizarTextoFecha();
	});
});

// ---------- RESET ----------
function resetearLista() {
	if (!confirm("¿Seguro que querés restablecer la lista?")) return;

	localStorage.clear();
	listas = JSON.parse(JSON.stringify(listaInicial));

	document.getElementById("lugar").value = "";
	fInicio.value = "";
	fFin.value = "";

	actualizarTextoFecha();
	render();
}

// ---------- INIT ----------
autoResize(lugar);
actualizarTextoFecha();
render();

</script>

</body>
</html>
